version: '3.8'

services:
  bot:
    build: .
    container_name: hh_fast_bot
    restart: always
    env_file:
      - .env
    environment:
      - USE_POSTGRES=true
      - DATABASE_URL=postgresql://user:password@db:5432/hh_bot
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    container_name: hh_bot_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hh_bot
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hh_bot_redis
    restart: always

volumes:
  pgdata:
